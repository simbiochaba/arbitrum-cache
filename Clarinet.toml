[project]
name = "arbitrum-cache"
authors = ["ArbitrumDev Team"]
description = "A Clarity smart contract for managing Arbitrum layer cache operations"
telemetry = false
requirements = []
[contracts.cache-manager]
path = "contracts/cache-manager.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
